<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Objects</title>
  </head>
  <body>
    <script>
      /*
      //object - objects groups multiple values together.
      //They make our code more organized and also allow us to use mutliple values together

      const product = {
        name: "sponge", //(value inside curly bracket ->  property)
        price: 1090,
      };

      console.log(product);
      console.log(product.name);

      product.name = 'cotton socks';
      console.log(product);

      // we can store any value inside an object

      const product2 = {
        name: 'shirt',
        'delivery-time': '1 day',
        rating: {
          stars: 4.5,
          count: 87
        },
        fun: function function1() {
          console.log('function inside object');
        }
      };

      // Bracket notation inside an object lets us use properties
      // that normally don't work with dot notation.

      console.log(product2);
      console.log(product2.name);
      console.log(product2['name']);
      console.log(product2['delivery-time']);

      console.log(product2.rating.count);

      product2.fun();

      // Function inside object => Method
      // console.log(), Math.random() are methods where console and Math are objects (built-in)

      // Built-in object: JSON

      // JSON -> JavaScript Object Notation
      // - similar to JavaScript Object but with fewer features
      // - used when we send data between computers or store data
      // - JSON doesn't support functions

      console.log(JSON.stringify(product2)); // JS OBJECT -> JSON
      
      const jsonString = JSON.stringify(product2);

      console.log(JSON.parse(jsonString)); // JSON -> Object
      
      // localStorage - save values more permanently
      */

      console.log('hello'.length)
      console.log('hello'.toUpperCase())

      const object1 ={
        message:'hello'
      };
      const object2 = object1;
      object1.message = 'Good job!';
      console.log(object1);
      console.log(object2)

      const object3 ={
        message: 'Good job!'
      }
      console.log(object3 === object1) //points to diff reference
      console.log(object2 === object1)//points to same reference

      const object4 ={
        message: 'Good job!',
        price : 799
      }
      //const message = object4.message;
      const {message,price} = object4;//destructuring
      console.log(message)
      console.log(price)

      const object5 ={
        //message : message
        message, //shorthand property

        //method : function function1(){
         // console.log('method');
        //}

        method(){
          console.log('method')
        }
      };//shorthand method
      console.log(object5)
    </script>
  </body>
</html>
