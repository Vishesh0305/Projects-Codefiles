<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Project</title>

  <!-- BoxIcons v2.1.2 -->
    <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet">

  <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  

  <style>
    *{
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
      font-family: 'Montserrat',sans-serif;
    }
    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f7f8; 
    }
    .container{
      display: flex;
    }
    .card{
      width: 280px;
      padding: 0px;
      margin: 0 20px;
      background: #fff;
      border-radius: 30px;
      box-shadow: 0 0 30px rgba(0, 0, 0, .04) ;
      transition: 0.4s ease;
    }
    .card:hover{
      transform: scale(1.05);
    }
    .card-image{
      position: relative;
      width: 100%;
      height: 380px;
      overflow: hidden;
      padding: 0 20px;
      text-align: center;
      background-color: #f4f7f8;
      border-radius: 30px 30px 12px 12px;
    }
    .card-image img{
      transition: .4s ease;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .card:hover .card-image img{
      transform: scale(1.02) rotate(-3deg)
      translateX(-5px);
      ;
    }
    .card-content{
  padding: 20px;
  text-align: center;
    }

    .card-content h3{
      font-size: 16px;
      margin-bottom: 15px;
    }

    button{
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
    }

    .by-now-btn{
      background: #111;
      color: #fff;
      
    }

    .add-to-cart-btn{
      background: transparent;
      border: 2px solid #111;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <div class="card-image">
        <img src="./dunk-low-retro-whitedragon-red-black-white-66b3667e7b69f.webp"alt="">
      </div>
      <div class="card-content">
        <h3>Nike Low Dunks Retro White Dragon</h3>
        <button class="by-now-btn">
          Buy Now
        </button>
        <button class="add-to-cart-btn">
          Add to Cart
        </button>
        </div>
    </div>
  </div>
</body>
</html>
