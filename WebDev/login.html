<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color:#1a1a1a;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
             background-color: #6c6c6c;
             border-radius: 6px;
             padding: 30px;
             width:300px;
        } 
        h2{
            color: aqua;
            text-align: center;
            margin-bottom: 20px;
        }
        form{
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        input{
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            background-color: #3a3a3a;
        }
        button{
            background-color: aqua;
            color: #232323;
            padding: 10px;
            border-radius: 8px;
        }
        button:hover{
            background-color: rgb(71, 87, 227);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
